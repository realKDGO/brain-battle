<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Battle - Select Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            padding: 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #e94560; font-size: 2.5em; margin-bottom: 5px; }
        .welcome { font-size: 1.2em; color: #a2a8d3; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: #16213e;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .card:hover { border-color: #e94560; transform: translateY(-5px); }
        h3 { margin-bottom: 10px; font-size: 1.5em; }
        .unavailable { opacity: 0.5; pointer-events: none; }
        input {
            width: 80%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button {
            padding: 10px 15px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            flex: 1;
        }
        .create-btn:hover { background: #e94560; }
        .join-btn:hover { background: #e94560; }

        /* Snackbar Element */
        #snackbar {
            visibility: hidden;
            min-width: 250px;
            background-color: #e94560;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            font-size: 1em;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
            left: 50%;
            transform: translateX(-50%);
        }
        #snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <h1>Select a Game</h1>
    <div class="welcome" id="welcomeText">Connecting...</div>

    <div class="grid">
        <!-- Word Chain -->
        <div class="card" id="card_WORD_CHAIN">
            <h3>Word Chain</h3>
            <p>Link compound words secretly!</p>
            <div class="join-controls">
                <input type="text" id="join_WORD_CHAIN" placeholder="Enter Room Code">
            </div>
            <div class="btn-group">
                <button class="create-btn" onclick="hostGame('WORD_CHAIN')">Host</button>
                <button class="join-btn" onclick="joinGame('WORD_CHAIN')">Join</button>
            </div>
        </div>

        <!-- Guess Number -->
        <div class="card unavailable">
            <h3>Guess Number</h3>
            <p>Coming Soon</p>
        </div>

        <!-- Connect Letters -->
        <div class="card unavailable">
            <h3>Connect Letters</h3>
            <p>Coming Soon</p>
        </div>

        <!-- Wordle -->
        <div class="card unavailable">
            <h3>Wordle Puzzle</h3>
            <p>Coming Soon</p>
        </div>

        <!-- Dingbats -->
        <div class="card unavailable">
            <h3>Dingbats</h3>
            <p>Coming Soon</p>
        </div>
    </div>

    <!-- Snackbar Element -->
    <div id="snackbar"></div>

    <script>
        function showError(msg) {
            const sb = document.getElementById("snackbar");
            sb.innerText = msg;
            sb.className = "show";
            setTimeout(() => { sb.className = sb.className.replace("show", ""); }, 3000);
        }

        const playerName = sessionStorage.getItem('playerName');
        if (!playerName) {
            window.location.href = 'index.html'; // Redirect if no name
        }

        document.getElementById('welcomeText').innerText = `Welcome, ${playerName}!`;

        function hostGame(gameType) {
            window.location.href = `lobby.html?action=create&game=${gameType}`;
        }

        function joinGame(gameType) {
            const roomCode = document.getElementById(`join_${gameType}`).value.trim().toUpperCase();
            if(!roomCode) return showError("Enter a Room Code!");
            window.location.href = `lobby.html?action=join&game=${gameType}&room=${roomCode}`;
        }
    </script>
</body>
</html>
